<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Venx Account</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f4f4f4;
}

.container{

width:95%;
max-width:430px;
background:white;
margin:40px auto;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px #ccc;

}

h2{

text-align:center;
color:#0b8f4d;
margin-bottom:20px;

}


input{

width:100%;
padding:12px;
margin-bottom:12px;
border:1px solid #ccc;
border-radius:8px;

}


button{

width:100%;
padding:13px;
margin-top:10px;
border:none;
border-radius:8px;
background:#0b8f4d;
color:white;
font-size:16px;
cursor:pointer;

}


.gray{

background:#555;

}


.hidden{

display:none;

}


.card{

background:#eee;
padding:15px;
border-radius:10px;

}


.card p{

margin:10px 0;

}


#message{

text-align:center;
margin-top:10px;

}

</style>

</head>


<body>


<div class="container">


<!-- LOGIN -->

<div id="loginBox">

<h2>Sign In</h2>


<input 
id="loginEmail"
type="email"
placeholder="Email">


<input
id="loginPassword"
type="password"
placeholder="Password">


<button id="loginBtn">
Sign In
</button>


<button class="gray" id="showRegister">
Create New Account
</button>


</div>



<!-- REGISTER -->

<div id="registerBox" class="hidden">


<h2>Create Account</h2>


<input 
id="name"
placeholder="Full Name">


<input 
id="regEmail"
type="email"
placeholder="Email">


<input
id="phone"
placeholder="Phone Number">


<input
id="password"
type="password"
placeholder="Password">


<button id="registerBtn">
Create Account
</button>


<button class="gray" id="showLogin">
Already have account
</button>


</div>



<!-- ACCOUNT DETAILS -->


<div id="accountBox" class="hidden">


<h2>My Account</h2>


<div class="card">

<p>
<b>Name:</b>
<span id="userName"></span>
</p>


<p>
<b>Email:</b>
<span id="userEmail"></span>
</p>


<p>
<b>Phone:</b>
<span id="userPhone"></span>
</p>


</div>



<button id="businessBtn">

</button>



<button class="gray" id="logoutBtn">
Logout
</button>


</div>



<div id="message"></div>


</div>





<script type="module">


import {initializeApp}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";


import {

getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut

}

from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";


import {

getFirestore,
doc,
setDoc,
getDoc,
collection,
query,
where,
getDocs,
serverTimestamp

}

from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";





const firebaseConfig={


apiKey:"AIzaSyCX2jTRmAJjTXAv4cpNFbERbPDI_gbmLtk",

authDomain:"venx-online-market.firebaseapp.com",

projectId:"venx-online-market",

storageBucket:"venx-online-market.firebasestorage.app",

messagingSenderId:"820627929510",

appId:"1:820627929510:web:aa97704fbf1c6bf4077767",

measurementId:"G-BLH2T3CBVQ"

};



const app=initializeApp(firebaseConfig);


const auth=getAuth(app);


const db=getFirestore(app);




const loginBox=document.getElementById("loginBox");

const registerBox=document.getElementById("registerBox");

const accountBox=document.getElementById("accountBox");

const message=document.getElementById("message");





// switch forms


showRegister.onclick=()=>{

loginBox.classList.add("hidden");

registerBox.classList.remove("hidden");

}



showLogin.onclick=()=>{

registerBox.classList.add("hidden");

loginBox.classList.remove("hidden");

}





// CREATE ACCOUNT


registerBtn.onclick=async()=>{


try{


const user=await createUserWithEmailAndPassword(

auth,

regEmail.value,

password.value

);



await setDoc(

doc(db,"users",user.user.uid),

{

fullname:name.value,

email:regEmail.value,

phone:phone.value,

createdAt:serverTimestamp()

}


);


}catch(e){

message.innerHTML=e.message;

}


}





// LOGIN


loginBtn.onclick=async()=>{


try{


await signInWithEmailAndPassword(

auth,

loginEmail.value,

loginPassword.value

);


}

catch(e){

message.innerHTML=e.message;

}


}





// CHECK USER


onAuthStateChanged(auth,async(user)=>{


if(user){


loginBox.classList.add("hidden");

registerBox.classList.add("hidden");

accountBox.classList.remove("hidden");



const userDoc=await getDoc(

doc(db,"users",user.uid)

);



if(userDoc.exists()){


let data=userDoc.data();


userName.innerHTML=data.fullname;

userEmail.innerHTML=data.email;

userPhone.innerHTML=data.phone;


}




// CHECK BUSINESS


const businessQuery=query(

collection(db,"businesses"),

where("ownerId","==",user.uid)

);



const result=await getDocs(businessQuery);



const businessBtn=document.getElementById("businessBtn");



if(!result.empty){


businessBtn.innerHTML="My Business";


businessBtn.onclick=()=>{

window.location="my-business.html";

}



}else{


businessBtn.innerHTML="Add Business";


businessBtn.onclick=()=>{

window.location="add-business.html";

}


}



}else{


accountBox.classList.add("hidden");

loginBox.classList.remove("hidden");


}



});





// LOGOUT


logoutBtn.onclick=()=>{


signOut(auth);


};



</script>


</body>
</html>
